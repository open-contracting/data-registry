version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "**/*"
    schedule:
      interval: "yearly"
    allow:
      - dependency-name: "knip"
    cooldown:
      default-days: 7
